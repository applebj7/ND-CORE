<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ND-CORE | 지능형 로컬 데이터 리트리버</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo">
                <img src="img/logo4.png" alt="ND-CORE Logo" class="brand-logo">
                <div class="logo-wrapper">
                    <span class="logo-text">ND-CORE</span>
                    <span class="logo-subtext">Naedam CORE Retrieval</span>
                    <span class="logo-subtext">(For AI File Search)</span>
                </div>
            </div>
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span class="status-label">Local Node Active</span>
            </div>
        </header>
        <div id="toast" class="toast"></div>
        <main class="content-area">
            <section>
                <span class="logo-text">Semantic File Matching System</span>
            </section>
            <section class="search-section">
                <div class="search-box-container">
                    <div class="filter-container">
                        <div class="filter-box">
                            <label for="searchType">검색 기준</label>
                            <select id="searchType">
                                <option value="name">파일명</option>
                                <option value="content">파일내용</option>
                                <option value="extension">확장자</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="search-box-container">
                    <input type="text" id="queryInput" placeholder="찾고자 하는 파일이나 키워드를 입력하세요" autocomplete="off">
                    <button id="searchBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="search-icon">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        Search
                    </button>
                </div>
                <p class="search-hint">입력값을 기반으로 최대 5개의 결과를 추출합니다.</p>
            </section>
            <section class="results-section" id="resultsSection" style="display: none;">
                <div class="section-header">
                    <h2>
                        <span data-bs-toggle="tooltip" title="베이즈 정리에 의한 확률적 랭킹 결과입니다."
                            style="cursor:pointer;">ℹ️</span>
                        Search Results
                        <span id="resultCount" class="badge">0</span>
                    </h2>
                </div>
                <div class="results-list" id="resultsList">
                    <!-- 결과가 여기에 렌더링됩니다 -->
                </div>
            </section>

            <div id="loadingOverlay" class="loading-overlay" style="display: none;">
                <div class="loader"></div>
                <p>파일을 찾는 중입니다...</p>
            </div>

        </main>

        <footer class="main-footer">
            <p>&copy; 2026 Naedam CnC. Extracting the Core of Your Local Data.</p>
        </footer>
    </div>
    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
